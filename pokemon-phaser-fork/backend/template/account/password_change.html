{% extends "base.html" %}
{% load static i18n %}

{% block title %}<title>Djangomon • Changer de mot de passe</title>{% endblock %}

{% block content %}
{% include "account/_poke_card_style.html" %}

<div class="login-wrapper">
  <div class="poke-card">
    <div class="poke-card-header">
      <div class="header-ball" aria-hidden="true"></div>
      <p class="header-title">
        CHANGER
        <span>Mot de passe</span>
      </p>
    </div>

    <div class="poke-card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn-poke-login" type="submit">
          MODIFIER
        </button>
      </form>

      <a class="btn-poke-link" href="{% url 'dashboard' %}">← Retour au dashboard</a>
    </div>

    <div class="poke-card-footer">
      <p>© Djangomon</p>
      <div class="led-dots" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
      </div>
      <p>v1.0.0</p>
    </div>
  </div>
</div>
{% endblock %}
